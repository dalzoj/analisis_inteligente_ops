[paths]
prompts = ./prompts
metrics_data = ./data/metrics.csv
orders_data = ./data/orders.csv

[llm]
name = anthropic

[llm_anthropic]
model_name = claude-haiku-4-5-20251001
max_tokens = 1000
temperature = 0.2

[prompts]
chat = chat_v1
code_gen = code_gen_v1
insights = insights_v1

[insights]
correlation_threshold = 0.5
anomaly_weeks = 4
anomaly_threshold = 0.5
trend_min_weeks = 4
benchmark_weeks = 4
benchmark_min_zones_per_group = 4
benchmark_deviation_threshold = 0.5